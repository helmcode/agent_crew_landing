name: Deploy Telemetry Worker

on:
  push:
    branches:
      - main
    paths:
      - 'telemetry/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: telemetry/package-lock.json

      - name: Install dependencies
        working-directory: telemetry
        run: npm ci

      - name: Apply D1 migrations
        working-directory: telemetry
        run: npx wrangler d1 migrations apply agentcrew-telemetry --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        working-directory: telemetry
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
