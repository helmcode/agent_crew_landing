services:
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["--auth", "${NATS_AUTH_TOKEN}", "-m", "8222"]

  api:
    image: ghcr.io/helmcode/agent_crew_api:0.4.10
    restart: unless-stopped
    user: root
    ports:
      - "${API_PORT:-3000}:8080"
    depends_on:
      - nats
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}
      - DATABASE_PATH=/data/agentcrew.db
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-24h}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - MULTI_TENANT=${MULTI_TENANT:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agentcrew_db:/data

  frontend:
    image: ghcr.io/helmcode/agent_crew:0.4.4
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - api

volumes:
  agentcrew_db:
